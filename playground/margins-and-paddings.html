<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margins and paddings</title>
    <style>
        body {
            font-size: 4em;
            font-family: sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        td {
            padding: 0;
            /* width: 100px;
            height: 100px; */
            border: 1px solid black;
            /* background-color: lightblue; */
        }
        input {
            font-size: 1em;
        }
    </style>
</head>
<body>
    <table>
        <thead></thead>
        <tbody>
            <tr>
                <td>x</td>
                <td>x</td>
                <td>x</td>
            </tr>
            <tr>
                <td>x</td>
                <td>
                    <div style="margin: 0; padding: 0; background-color: lightgray;">
                        x
                    </div>
                </td>
                <td><input type="text" value="hallo"/></td>
            </tr>
            <tr>
                <td>x</td>
                <td>x</td>
                <td>x</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
