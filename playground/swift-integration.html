<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Swift Integration Test</h1>
    <p>Click the button below to trigger a barcode scan from a webpage displayed in a native iOS app</p>
    <button onclick='scanBarcode("barcodeResult1")'>
        Trigger barcode scan in iOS
    </button>

    <input type="text" id="barcodeResult1" placeholder="Scanned barcode will appear here" readonly>

    <hr>

    <input type="text" id="barcodeResult2" placeholder="Type something here" onclick='scanBarcode("barcodeResult2")'>

<script>
        window.onload = function() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.bridge) {
                console.log("Bridge is available");
            } else {
                console.log("Bridge is not available");
            }
        };

        function scanBarcode(htmlId) {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.bridge) {
                window.webkit.messageHandlers.bridge.postMessage({"action": "scanBarcode", "htmlId": htmlId})
            } else {
                console.log("Bridge is not available");
            }
        }
        function handleBarcodeScanResult(result, htmlId) {
            console.log("Received barcode scan result: " + result);
            // alert("Scanned barcode: " + result);
            document.getElementById(htmlId).value = result;
        }
    </script>
</body>
</html>
